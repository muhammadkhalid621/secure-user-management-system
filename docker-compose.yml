services:
  mysql:
    image: mysql:8.4
    container_name: sums-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sums_db
      MYSQL_USER: sums_user
      MYSQL_PASSWORD: sums_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: sums-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
