services:
  postgres:
    image: postgres:16-alpine
    container_name: sums-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sums_db
      POSTGRES_USER: sums_user
      POSTGRES_PASSWORD: sums_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sums-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

